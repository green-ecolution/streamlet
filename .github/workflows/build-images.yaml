name: Build and Push Pipeline Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".docker/**"
      - ".dockerignore"
      - ".github/workflows/build-images.yaml"

concurrency:
  group: build-images
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: pbf-patch
            context: .
            file: .docker/Dockerfile.pbf-patch
          - image: generate-valhalla
            context: .docker
            file: .docker/Dockerfile.valhalla
          - image: cleanup-tiles
            context: .docker
            file: .docker/Dockerfile.cleanup
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image variables
        id: vars
        run: |
          echo "repo_lc=${REPO,,}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/${{ matrix.image }}:${{ steps.vars.outputs.sha_short }}
