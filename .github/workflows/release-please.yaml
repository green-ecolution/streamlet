name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GREEN_ECOLUTION_PAT }}

  build-server:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set image variables
        id: vars
        run: echo "repo_lc=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile.server
          push: true
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=min,scope=server
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/server:${{ needs.release-please.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/server:${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            ghcr.io/${{ steps.vars.outputs.repo_lc }}/server:latest
